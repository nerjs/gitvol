name: Bump version & release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver type of new version (major / minor / patch)'
        required: true
        type: choice
        options: 
        - patch
        - minor
        - major

jobs:
  
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out source
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}
          
      - name: Cache Cargo target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-debug-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-debug-
            
            
      - name: Checkout source
        uses: actions/checkout@v3
        
      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy -- -D warnings
        
      - name: tests
        run: cargo test
  
  
  bump-version:
    runs-on: ubuntu-latest
    needs: check

    steps:
      
      - name: Check out source
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}
        
      - name: Cache Cargo target directory
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}

      - name: Install cargo-edit util
        run: cargo install cargo-edit
  
      - name: Setup Git
        run: |
          git config user.name 'nerjs'
          git config user.email 'nerjs.stap@gmail.com'
  
      - name: bump version
        run: cargo set-version --bump ${{ github.event.inputs.version }}
        
      - name: commit changes
        run: git add . && git commit -m "Bump version"
      
      - name: Create tag
        run: V=$(cargo pkgid | cut -d "#" -f2); git tag "v$V"
  
      - name: Push latest version
        run: git push origin master --follow-tags
        
        
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: bump-version
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Create Release
        run: gh release create ${{ github.ref }} --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLISH_TOKEN }}